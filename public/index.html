<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GameShare — общие аккаунты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="site-header">
            <div class="container header-container">
                <div class="logo">
                    <span class="logo-icon">🎮</span>
                    <span class="logo-text">GameShare</span>
                </div>
                <div id="auth-buttons" class="auth-buttons"></div>
            </div>
        </header>

        <main class="main-content">
            <div class="container">
                <div id="games-container" class="games-grid"></div>
                <div id="admin-panel" class="admin-panel" style="display: none;"></div>
            </div>
        </main>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
